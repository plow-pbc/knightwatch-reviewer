# N codex reviewer containers + ONE shared test-runner (+ one dind). Codex doesn't
# need docker (it calls OpenAI), so the reviewers run with NO dind access at all —
# only the test-runner touches the daemon. That fully isolates the sandbox-bypassed
# codex agents from the privileged dind.
#
# Flow: reviewer-K claims a PR (shared `state` volume holds the per-PR lock + runs/),
# clones into the shared `workdirs` volume, and delegates `just test` to the
# test-runner via a request file under /shared/test-queue; the test-runner (the only
# container sharing dind's netns) runs the test as the unprivileged reviewer-test
# user and writes the result back. Codex agents then run in reviewer-K (no daemon
# reachable) and post.
#
# One shared test-runner (not one per account): fewer containers, one dind/build
# cache, one heavy test stack at a time (lighter memory), and `just test`
# serialization falls out for free — the codex parallelism that distributes load
# across accounts is untouched.
#
# Scale-out (add account N): add only a reviewer-N (its codex-account + per-reviewer
# repos/local volumes). The test-runner + dind are shared, so nothing else changes.

services:
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""          # plaintext daemon on loopback within the test-runner's netns only
    command: ["--host=tcp://127.0.0.1:2375"]
    mem_limit: 12g
    volumes:
      - dind-lib:/var/lib/docker      # persist build cache across reviews

  test-runner:
    image: knightwatch-reviewer:dev
    restart: unless-stopped
    entrypoint: ["./test-runner-loop.sh"]
    network_mode: "service:dind"      # share dind's netns → `just test`'s published localhost ports work
    depends_on: [dind]
    mem_limit: 24g                    # runs the heavy compose test stack (one at a time)
    environment:
      STATE_DIR: /shared              # holds the test-queue + per-run test logs
      WORKDIRS_DIR: /workdirs         # per-PR checkouts (shared with reviewers)
      LOCAL_STATE_DIR: /trstate       # just-test lock (test-runner-local)
      DOCKER_HOST: tcp://127.0.0.1:2375
      REVIEWER_TEST_USER: reviewer-test  # `just test` drops to this unprivileged user
    volumes:
      - state:/shared
      - workdirs:/workdirs
      - tr-state:/trstate

  reviewer-1: &reviewer
    image: knightwatch-reviewer:dev
    restart: unless-stopped
    # NO network_mode / DOCKER_HOST — codex has no path to any docker daemon.
    depends_on: [test-runner]
    mem_limit: 8g                     # codex agents + clone + post; the heavy test stack is the test-runner's
    environment: &reviewer-env
      STATE_DIR: /shared              # per-PR lock + runs/ (SHARED across reviewers + test-runner)
      REPOS_DIR: /local/repos         # canonical clones (per-reviewer)
      WORKDIRS_DIR: /workdirs         # per-PR checkouts (SHARED so the test-runner can test them)
      LOCAL_STATE_DIR: /local/state   # canonical lock + quota-paused-until (per-reviewer)
      CONFIG_ENV_FILE: /root/.kwr/config.env  # root-only → not readable outside the reviewer
      TEST_RUNNER_QUEUE: /shared/test-queue   # run_just_test delegates here instead of running locally
      WORKER_ID: "1"
    volumes: &reviewer-volumes
      - state:/shared
      - workdirs:/workdirs
      - reviewer1-repos:/local/repos
      - reviewer1-local:/local/state
      - ./docker/secrets/codex-account-a:/root/.codex:ro        # OpenAI account A
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro       # tracked-repo manifest
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro    # ops knobs + `export GH_TOKEN=…`
      - ./docker/secrets/claude-standards:/root/.claude:ro      # review standards

  reviewer-2:
    <<: *reviewer
    environment:
      <<: *reviewer-env
      WORKER_ID: "2"
    volumes:
      - state:/shared
      - workdirs:/workdirs
      - reviewer2-repos:/local/repos
      - reviewer2-local:/local/state
      - ./docker/secrets/codex-account-b:/root/.codex:ro        # OpenAI account B
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro
      - ./docker/secrets/claude-standards:/root/.claude:ro

volumes:
  state:            # /shared: per-PR lock, runs/, test-queue — shared by all
  workdirs:         # /workdirs: per-PR checkouts — shared by reviewers + test-runner
  reviewer1-repos:
  reviewer1-local:
  reviewer2-repos:
  reviewer2-local:
  tr-state:
  dind-lib:

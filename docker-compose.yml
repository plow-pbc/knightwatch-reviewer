# N reviewer units on one host. Each reviewer shares its dind sidecar's
# network namespace (network_mode: service:dind-K) so `just test`'s
# published scenario ports land on a localhost the reviewer shares with
# the daemon, and DOCKER_HOST can be tcp://127.0.0.1:2375.
#
# The `claims` volume is SHARED across ALL reviewers (STATE_DIR=/shared): it
# holds runs/ review-state, the per-PR locks, the just-test concurrency
# semaphore (a host-wide memory cap, deliberately shared — see
# review-one-pr.sh), the locks/__enumerator election flock, and the
# enumerate-once work-list queue.json. The non-blocking per-PR flock + KNOWN_SHA
# gate dedup reviews across containers; one container per ENUMERATE_SECS window
# runs the GraphQL enumerate and writes queue.json, and every reviewer consumes
# it and claims PRs via the per-PR flock. LOCAL_STATE_DIR is per-container and
# holds ONLY the canonical clone/fetch lock + codex quota-pause + fatal-auth
# offline state;
# repos/, workdirs/, ~/.codex are per-container too.
#
# Scale-out (add account N): add a dind-N + reviewer-N pair. Each reviewer is
# the `<<: *reviewer` + `<<: *reviewer-env` contract plus only its per-account
# overrides — network_mode, WORKER_ID, local volume, codex-account mount.
# Memory: reviewer (codex agents) + dind (just-test compose stack) per unit is
# capped near the legacy single-unit budget so prod Plow keeps headroom on the
# 128G host. Tune after observing real peaks.

x-dind: &dind
  image: docker:27-dind
  privileged: true
  environment:
    DOCKER_TLS_CERTDIR: ""          # plaintext daemon within the shared netns only
  # Bind loopback ONLY. reviewer-K shares dind-K's netns (network_mode below), so
  # 127.0.0.1 reaches its own daemon — but a sibling pair's netns can't, so a
  # 0.0.0.0 bind (reachable across the compose network) would let one reviewer
  # drive another account's daemon. Keep DOCKER_HOST=tcp://127.0.0.1:2375.
  #
  # `dockerd` MUST be the first token. dockerd-entrypoint.sh injects its own
  # default `--host=tcp://0.0.0.0:2375` whenever argv is empty or starts with `-`
  # (its line ~100). A bare `--host=…` first token trips that, so the entrypoint
  # ALSO appends 0.0.0.0:2375 — which both defeats the loopback-only intent and
  # collides on the port, so dockerd dies with "bind: address already in use".
  # Leading with `dockerd` skips the injection, binding ONLY the hosts below.
  command: ["dockerd", "--host=unix:///var/run/docker.sock", "--host=tcp://127.0.0.1:2375"]
  mem_limit: 12g

# Shared reviewer service contract (everything identical across accounts).
x-reviewer: &reviewer
  image: knightwatch-reviewer:dev
  restart: unless-stopped
  mem_limit: 20g

# Shared reviewer env; per-service blocks merge this and add WORKER_ID.
x-reviewer-env: &reviewer-env
  STATE_DIR: /shared              # per-PR lock + runs/ (SHARED across containers)
  REPOS_DIR: /local/repos         # per-container
  WORKDIRS_DIR: /local/workdirs   # per-container
  LOCAL_STATE_DIR: /local/state   # canonical clone/fetch lock + quota-pause + fatal-auth offline (per-container; just-test semaphore is in shared STATE_DIR)
  DOCKER_HOST: tcp://127.0.0.1:2375
  CONFIG_ENV_FILE: /root/.kwr/config.env  # root-only path → reviewer-test (just test) can't read the token file

services:
  dind-1:
    <<: *dind
    volumes:
      - dind1-lib:/var/lib/docker   # persist build cache across reviews

  reviewer-1:
    <<: *reviewer
    network_mode: "service:dind-1"  # share dind's netns → localhost scenario ports work
    depends_on: [dind-1]
    environment:
      <<: *reviewer-env
      WORKER_ID: "1"
    volumes:
      - claims:/shared
      - reviewer1-local:/local
      # Writable (NOT :ro): codex loads/migrates config and refreshes its OAuth
      # token inside its home — a read-only mount makes every codex call die with
      # "Error loading configuration: Read-only file system". The creds stay
      # protected by /root's 0700 perms (the unprivileged test user can't reach
      # /root at all), so dropping :ro doesn't widen test-user access.
      - ./docker/secrets/codex-account-a:/root/.codex          # OpenAI account A
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro      # tracked-repo manifest
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro      # ops knobs + `export GH_TOKEN=…` (the one config seam; review.sh sources it)
      - ./docker/secrets/claude-standards:/root/.claude:ro     # review standards (worker reads as root; the test user is isolated from /root)

  dind-2:
    <<: *dind
    volumes:
      - dind2-lib:/var/lib/docker

  reviewer-2:
    <<: *reviewer
    network_mode: "service:dind-2"
    depends_on: [dind-2]
    environment:
      <<: *reviewer-env
      WORKER_ID: "2"
    volumes:
      - claims:/shared
      - reviewer2-local:/local
      - ./docker/secrets/codex-account-b:/root/.codex          # OpenAI account B (writable — see account A note)
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro
      - ./docker/secrets/claude-standards:/root/.claude:ro

  dind-3:
    <<: *dind
    volumes:
      - dind3-lib:/var/lib/docker

  reviewer-3:
    <<: *reviewer
    network_mode: "service:dind-3"
    depends_on: [dind-3]
    environment:
      <<: *reviewer-env
      WORKER_ID: "3"
    volumes:
      - claims:/shared
      - reviewer3-local:/local
      - ./docker/secrets/codex-account-c:/root/.codex          # OpenAI account C (writable — see account A note)
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro
      - ./docker/secrets/claude-standards:/root/.claude:ro

  dind-4:
    <<: *dind
    volumes:
      - dind4-lib:/var/lib/docker

  reviewer-4:
    <<: *reviewer
    network_mode: "service:dind-4"
    depends_on: [dind-4]
    environment:
      <<: *reviewer-env
      WORKER_ID: "4"
    volumes:
      - claims:/shared
      - reviewer4-local:/local
      - ./docker/secrets/codex-account-d:/root/.codex          # OpenAI account D (writable — see account A note)
      - ./docker/secrets/repos.conf:/shared/repos.conf:ro
      - ./docker/secrets/config.env:/root/.kwr/config.env:ro
      - ./docker/secrets/claude-standards:/root/.claude:ro

volumes:
  # EXTERNAL fixed-name so the shared review state (runs/ — the KNOWN_SHA dedup
  # history) survives project rename / down -v / prune. Setup + migration:
  # README § Containerized deployment. (reviewerN-local / dindN-lib stay
  # compose-managed — rebuildable state, not dedup history.)
  claims:
    external: true
    name: kwr_claims
  reviewer1-local:
  reviewer2-local:
  reviewer3-local:
  reviewer4-local:
  dind1-lib:
  dind2-lib:
  dind3-lib:
  dind4-lib:

#!/bin/bash
# Tracked GitHub repos for the knightwatch-reviewer bot. Single source
# of truth — sourced by review.sh, learn-from-replies.sh,
# approve-from-replies.sh, re-request-poller.sh, and lib/review-one-pr.sh.
#
# To add a repo: append a line to REPOS and a corresponding entry to
# KID_PATHS (the local path to the repo's kid-prior-art index).
# Then run ./install.sh — it symlinks this file into ~/.pr-reviewer/
# and reloads systemd so the next 2-min tick picks up the new repo.
#
# KID_PATHS is consulted by lib/review-one-pr.sh when running
# kid-prior-art. Repos that don't have a .keepitdry index work fine —
# the kid-prior-art block silently skips when the path is missing or
# has no index. Setting the path is harmless even if kid isn't wired
# up yet; it lights up automatically when the index lands.

REPOS=(
    "cncorp/plow"
    "cncorp/plow-content"
    "srosro/tkmx-client"
    "srosro/tkmx-server"
    "srosro/knightwatch-reviewer"
    "srosro/vibe-engineering"
)

declare -A KID_PATHS=(
    ["cncorp/plow"]="$HOME/Hacking/plow-kid"
    ["cncorp/plow-content"]="$HOME/Hacking/plow-content"
    ["srosro/tkmx-client"]="$HOME/Hacking/tkmx-client"
    ["srosro/tkmx-server"]="$HOME/Hacking/tkmx-server"
    ["srosro/knightwatch-reviewer"]="$HOME/Hacking/knightwatch-reviewer"
    ["srosro/vibe-engineering"]="$HOME/Hacking/vibe-engineering"
)

# Per-repo source-checkout path. Used by lib/review-one-pr.sh to stage
# .codex-scratch/search-roots.md, the cross-repo grep surface for the
# dead-code-search and consumers specialists. Distinct from KID_PATHS
# (kid-index path, not source) — KID_PATHS["cncorp/plow"] points at
# plow-kid for kid lookups; SOURCE_PATHS["cncorp/plow"] points at the
# plow source checkout where greppable code actually lives. Empty /
# unset = exclude that repo from the search surface.
declare -A SOURCE_PATHS=(
    ["cncorp/plow"]="$HOME/Hacking/plow"
    ["cncorp/plow-content"]="$HOME/Hacking/plow-content"
    ["srosro/tkmx-client"]="$HOME/Hacking/tkmx-client"
    ["srosro/tkmx-server"]="$HOME/Hacking/tkmx-server"
    ["srosro/knightwatch-reviewer"]="$HOME/Hacking/knightwatch-reviewer"
    ["srosro/vibe-engineering"]="$HOME/Hacking/vibe-engineering"
)

# Per-repo dead-code static-analysis command. Run by lib/review-one-pr.sh
# on touched files; stdout captured to .codex-scratch/dead-code-static.md
# for the dead-code-search LLM pre-pass to verify. Empty string = no
# static tool for that repo (LLM grep still runs from the diff alone).
#
# Invocation: `bash -c "$cmd" -- "$@"` with cwd = the PR's per-PR workdir
# and the touched-files list passed as positional args. The command MUST
# reference files as `"$@"` — they are PR-controlled and `eval` would be
# command-injectionable. Filter to language-appropriate paths inline; e.g.
# vulture errors on non-Python files, so feed it only `*.py`. Non-zero
# exit only degrades when stdout is also empty — vulture exits 1 *because*
# findings exist, which is data, not failure.
#
# The xargs-NUL pattern below is robust against filenames with whitespace
# or shell metacharacters. `xargs -r` skips invocation when the filtered
# list is empty.
declare -A DEAD_CODE_CMDS=(
    ["cncorp/plow"]='printf "%s\0" "$@" | grep -z "\.py$" | xargs -0 -r vulture --min-confidence 80'
    ["cncorp/plow-content"]='printf "%s\0" "$@" | grep -z "\.py$" | xargs -0 -r vulture --min-confidence 80'
    ["srosro/tkmx-client"]=''
    ["srosro/tkmx-server"]=''
    ["srosro/knightwatch-reviewer"]=''
    ["srosro/vibe-engineering"]=''
)

# Per-repo strict-typing pre-check. Same shape as DEAD_CODE_CMDS: the
# worker runs the cmd in REPO_DIR; non-empty stdout is treated as a
# deterministic-finding signal and gets injected into the posted review
# as a `[nit]` under "Pre-merge auto-checks" — bypasses LLM judgment
# entirely. Empty stdout = strict mode is enforced; no nit posted.
#
# The two helper scripts under $REVIEWER_LIB_DIR/checks/ implement the
# language-specific detection (Python: pyproject.toml [tool.mypy] strict
# / [tool.pyright|basedpyright] typeCheckingMode / pyrightconfig.json /
# mypy.ini / setup.cfg; TS: tsconfig.json compilerOptions.strict).
# Bash-only repos leave this empty — strict typing isn't a thing for bash.
#
# Each helper accepts an optional PROJECT_DIR arg (relative to REPO_DIR)
# for monorepos whose strict config lives under a subdir — e.g. plow's
# api/pyproject.toml. Default is "." (repo root). The arg is operator-
# controlled (here, not PR-controlled), so no path-injection concern.
#
# To wire a new language: drop a checker at lib/checks/<lang>-strict-typing.sh
# (must output gap-description on stdout when not enforced, empty when
# enforced) and reference it here for the relevant repos.
declare -A STRICT_TYPING_CMDS=(
    ["cncorp/plow"]='bash "$REVIEWER_LIB_DIR/checks/python-strict-typing.sh" api'
    ["cncorp/plow-content"]='bash "$REVIEWER_LIB_DIR/checks/python-strict-typing.sh"'
    ["srosro/tkmx-client"]=''
    ["srosro/tkmx-server"]=''
    ["srosro/knightwatch-reviewer"]=''
    ["srosro/vibe-engineering"]=''
)
